    # ── Payments ──────────────────────────────────────────────────
    PaymentObligation:
      type: object
      required: [id, household_id, description, status, created_at]
      properties:
        id:
          type: integer
        household_id:
          type: integer
        source_inbox_id:
          type: ["integer", "null"]
        description:
          type: string
        recipient:
          type: ["string", "null"]
        amount_cents:
          type: ["integer", "null"]
        currency:
          type: string
          default: BRL
        due_date:
          type: ["string", "null"]
          description: ISO date YYYY-MM-DD
        is_recurring:
          type: boolean
        recurrence_pattern:
          type: ["string", "null"]
        owner_id:
          type: ["integer", "null"]
        paid_by_id:
          type: ["integer", "null"]
        reimbursement_owed_by_id:
          type: ["integer", "null"]
        payment_method:
          type: ["string", "null"]
          enum: [pix, boleto, cartao, dinheiro, ted]
        status:
          type: string
          enum: [pending, paid, overdue, cancelled, comprovante_received]
        paid_at:
          type: ["string", "null"]
          format: date-time
        proof_url:
          type: ["string", "null"]
        reimbursement_note:
          type: ["string", "null"]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    PaymentObligationInput:
      type: object
      required: [description]
