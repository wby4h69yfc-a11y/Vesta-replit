openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Vesta Family Logistics OS API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication endpoints
  - name: inbox
    description: Inbox item operations
  - name: actions
    description: Suggested action operations
  - name: tasks
    description: Task operations
  - name: events
    description: Calendar event operations
  - name: contacts
    description: Household contacts
  - name: rules
    description: Smart rules management
  - name: household
    description: Household settings and members
  - name: dashboard
    description: Dashboard aggregates and summaries
  - name: patterns
    description: Pattern observations and suggestions
  - name: briefing
    description: Daily briefing operations
  - name: memory
    description: Household memory staging and audit log
  - name: privacy
    description: LGPD data portability and account deletion
  - name: payments
    description: Payment obligations, comprovantes, and reimbursement tracking
  - name: storage
    description: Object storage upload and serving endpoints
  - name: creche
    description: Creche waitlist and school workflow tracking
  - name: templates
    description: Pre-built rule templates library
  - name: providers
    description: Service provider reliability memory

paths:
  /storage/uploads/request-url:
    post:
      tags: [storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestUploadUrlBody"
      responses:
        "200":
          description: Presigned upload URL generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequestUploadUrlResponse"
        "400":
          description: Missing or invalid fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /storage/public-objects/{filePath}:
    get:
      tags: [storage]
      operationId: getPublicObject
      summary: Serve a public asset
      parameters:
        - name: filePath
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Object content streamed
        "404":
          description: Not found
  /storage/objects/{objectPath}:
    get:
      tags: [storage]
      operationId: getStorageObject
      summary: Serve a private object entity
      parameters:
        - name: objectPath
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Object content streamed
        "404":
          description: Not found
  /auth/user:
    get:
      tags: [auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Auth status resolved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'
  /login:
    get:
      tags: [auth]
      operationId: beginBrowserLogin
      summary: Start the browser OIDC login flow
      parameters:
        - name: returnTo
          in: query
          required: false
          description: Relative path to redirect to after login (must start with `/`). Defaults to `/`.
          schema:
            type: string
      responses:
        '302':
          description: Redirect to the OIDC authorization endpoint.
  /callback:
    get:
      tags: [auth]
      operationId: handleBrowserLoginCallback
      summary: Complete the browser OIDC login flow
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
        - name: iss
          in: query
          required: false
          schema:
            type: string
            format: uri
      responses:
        '302':
          description: Redirect to the returnTo path on success or /api/login on failure.
  /logout:
    get:
      tags: [auth]
      operationId: logoutBrowserSession
      summary: Clear the session and begin OIDC logout
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '302':
          description: Redirect to the OIDC provider logout URL.
  /mobile-auth/token-exchange:
    post:
      tags: [auth]
      operationId: exchangeMobileAuthorizationCode
      summary: Exchange a mobile OIDC code for a session token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MobileTokenExchangeRequest'
      responses:
        '200':
          description: Session created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileTokenExchangeSuccess'
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Token exchange failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /mobile-auth/logout:
    post:
      tags: [auth]
      operationId: logoutMobileSession
      summary: Delete a mobile session token
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
      responses:
        '200':
          description: Logout processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutSuccess'

  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Dashboard ──────────────────────────────────────────────────
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Today's summary — events, pending inbox count, upcoming items
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/today-events:
    get:
      operationId: getTodayEvents
      tags: [dashboard]
      summary: Calendar events for today
      responses:
        "200":
          description: Today's events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CalendarEvent"

  /dashboard/upcoming-tasks:
    get:
      operationId: getUpcomingTasks
      tags: [dashboard]
      summary: Tasks due in the next 7 days
      responses:
        "200":
          description: Upcoming tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"

  /dashboard/activity-feed:
    get:
      operationId: getActivityFeed
      tags: [dashboard]
      summary: Recent approved / dismissed actions feed
      responses:
        "200":
          description: Activity feed items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  /dashboard/category-breakdown:
    get:
      operationId: getCategoryBreakdown
      tags: [dashboard]
      summary: Count of inbox items grouped by category this month
      responses:
        "200":
          description: Category breakdown
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CategoryCount"

  # ── Inbox ───────────────────────────────────────────────────────
  /inbox:
    get:
      operationId: listInboxItems
      tags: [inbox]
      summary: List inbox items
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [received, classifying, ready_for_review, approved, dismissed, failed, manual_review]
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: List of inbox items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InboxItem"
    post:
      operationId: createInboxItem
      tags: [inbox]
      summary: Create a new inbox item (manual in-app input)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InboxItemInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InboxItem"

  /inbox/{id}:
    get:
      operationId: getInboxItem
      tags: [inbox]
      summary: Get a single inbox item with its suggested actions
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Inbox item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InboxItemDetail"
        "404":
          description: Not found

  /inbox/{id}/classify:
    post:
      operationId: classifyInboxItem
      tags: [inbox]
      summary: Trigger AI classification of an inbox item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Classification triggered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InboxItem"

  # ── Suggested Actions ───────────────────────────────────────────
  /actions:
    get:
      operationId: listActions
      tags: [actions]
      summary: List pending suggested actions
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, approved, dismissed, auto_handled]
        - name: category
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of actions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SuggestedAction"

  /actions/{id}/approve:
    post:
      operationId: approveAction
      tags: [actions]
      summary: Approve a suggested action (writes calendar event + tasks)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ActionApproval"
      responses:
        "200":
          description: Approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuggestedAction"

  /actions/{id}/dismiss:
    post:
      operationId: dismissAction
      tags: [actions]
      summary: Dismiss a suggested action
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Dismissed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuggestedAction"

  /actions/{id}/edit:
    patch:
      operationId: editAction
      tags: [actions]
      summary: Edit and approve a suggested action
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ActionEdit"
      responses:
        "200":
          description: Updated and approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuggestedAction"

  /actions/cascades:
    get:
      operationId: listActionCascades
      tags: [actions]
      summary: List active cascade groups with their nested actions
      responses:
        "200":
          description: Active cascades
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActionCascadeWithActions"

  /actions/cascades/{id}/approve-all:
    post:
      operationId: approveCascadeAll
      tags: [actions]
      summary: Approve all pending sub-items in a cascade
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CascadeBulkResult"

  /actions/cascades/{id}/dismiss-all:
    post:
      operationId: dismissCascadeAll
      tags: [actions]
      summary: Dismiss all pending sub-items in a cascade
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Dismissed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CascadeBulkResult"

  # ── Creche Waitlists (WF-20) ─────────────────────────────────────
  /creche-waitlists:
    get:
      operationId: listCrecheWaitlists
      tags: [creche]
      summary: List creche waitlist entries for the household
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [waiting, called, enrolled, cancelled]
      responses:
        "200":
          description: List of waitlist entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CrecheWaitlist"
    post:
      operationId: createCrecheWaitlist
      tags: [creche]
      summary: Create a new creche waitlist entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CrecheWaitlistInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CrecheWaitlist"

  /creche-waitlists/{id}:
    patch:
      operationId: updateCrecheWaitlist
      tags: [creche]
      summary: Update a creche waitlist entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CrecheWaitlistUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CrecheWaitlist"
        "404":
          description: Not found

  # ── Tasks ────────────────────────────────────────────────────────
  /tasks:
    get:
      operationId: listTasks
      tags: [tasks]
      summary: List household tasks
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, in_progress, done, cancelled]
        - name: owner_id
          in: query
          schema:
            type: ["integer", "null"]
        - name: category
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"
    post:
      operationId: createTask
      tags: [tasks]
      summary: Create a task manually
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  /tasks/{id}:
    get:
      operationId: getTask
      tags: [tasks]
      summary: Get a task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "404":
          description: Not found
    patch:
      operationId: updateTask
      tags: [tasks]
      summary: Update a task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
    delete:
      operationId: deleteTask
      tags: [tasks]
      summary: Delete a task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /tasks/{id}/complete:
    post:
      operationId: completeTask
      tags: [tasks]
      summary: Mark a task as done
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  # ── Calendar Events ──────────────────────────────────────────────
  /events:
    get:
      operationId: listEvents
      tags: [events]
      summary: List calendar events
      parameters:
        - name: from
          in: query
          schema:
            type: string
            format: date
        - name: to
          in: query
          schema:
            type: string
            format: date
        - name: category
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CalendarEvent"
    post:
      operationId: createEvent
      tags: [events]
      summary: Create a calendar event manually
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CalendarEventInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalendarEvent"

  /events/{id}:
    get:
      operationId: getEvent
      tags: [events]
      summary: Get a calendar event
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalendarEvent"
        "404":
          description: Not found
    patch:
      operationId: updateEvent
      tags: [events]
      summary: Update a calendar event
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CalendarEventUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalendarEvent"
    delete:
      operationId: deleteEvent
      tags: [events]
      summary: Delete a calendar event
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Contacts ─────────────────────────────────────────────────────
  /contacts:
    get:
      operationId: listContacts
      tags: [contacts]
      summary: List household contacts
      parameters:
        - name: category
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of contacts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Contact"
    post:
      operationId: createContact
      tags: [contacts]
      summary: Create a contact
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contact"

  /contacts/{id}:
    patch:
      operationId: updateContact
      tags: [contacts]
      summary: Update a contact
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contact"
    delete:
      operationId: deleteContact
      tags: [contacts]
      summary: Delete a contact
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /contacts/consent-due:
    get:
      operationId: getContactsConsentDue
      tags: [contacts]
      summary: List contacts whose consent check-in is overdue or due within the next 14 days
      responses:
        "200":
          description: List of contacts with upcoming consent check-in
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Contact"

  /contacts/{id}/rate:
    post:
      operationId: rateContact
      tags: [providers]
      summary: Rate a service provider after an interaction
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactRateInput"
      responses:
        "200":
          description: Rating applied; contact reliability updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactRateResult"
        "400":
          description: Invalid rating value
        "404":
          description: Contact not found

  /contacts/{id}/request-rating:
    post:
      operationId: requestContactRating
      tags: [providers]
      summary: Send a WhatsApp rating prompt to the household admin for this provider
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Rating request sent
          content:
            application/json:
              schema:
                type: object
                required: [whatsapp_sent]
                properties:
                  whatsapp_sent:
                    type: boolean
        "404":
          description: Contact not found

  /contacts/{id}/request-consent:
    post:
      operationId: requestContactConsent
      tags: [contacts]
      summary: Send a WhatsApp consent request to a contact (LGPD)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Consent request sent (or attempted)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsentRequestResponse"
        "400":
          description: Contact has no phone number
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "409":
          description: Contact has already consented
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "429":
          description: Rate limited — one consent request per 24h per contact
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsentRateLimitError"

  # ── Privacy (LGPD) ────────────────────────────────────────────────
  /privacy/export/summary:
    get:
      operationId: getPrivacyExportSummary
      tags: [privacy]
      summary: Returns item counts and estimated file size before a full export
      responses:
        "200":
          description: Export summary with item counts and estimated size
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrivacyExportSummary"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /privacy/export:
    get:
      operationId: exportPrivacyData
      tags: [privacy]
      summary: Export all household data as JSON (LGPD Art. 18 V)
      responses:
        "200":
          description: Full household data export
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrivacyExport"

  /account:
    delete:
      operationId: deleteAccount
      tags: [privacy]
      summary: Permanently delete the account and all household data (LGPD Art. 18 VI)
      responses:
        "204":
          description: Account and all household data deleted
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  # ── Rules ────────────────────────────────────────────────────────
  /rules:
    get:
      operationId: listRules
      tags: [rules]
      summary: List smart rules
      responses:
        "200":
          description: List of rules
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Rule"
    post:
      operationId: createRule
      tags: [rules]
      summary: Create a smart rule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuleInput"
      responses:
        "201":
          description: Created
          content:
