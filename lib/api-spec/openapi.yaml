openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Vesta Family Logistics OS API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication endpoints
  - name: inbox
    description: Inbox item operations
  - name: actions
    description: Suggested action operations
  - name: tasks
    description: Task operations
  - name: events
    description: Calendar event operations
  - name: contacts
    description: Household contacts
  - name: rules
    description: Smart rules management
  - name: household
    description: Household settings and members
  - name: dashboard
    description: Dashboard aggregates and summaries
  - name: patterns
    description: Pattern observations and suggestions
  - name: briefing
    description: Daily briefing operations
  - name: memory
    description: Household memory staging and audit log
  - name: privacy
    description: LGPD data portability and account deletion

paths:
  /auth/user:
    get:
      tags: [auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Auth status resolved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'
  /login:
    get:
      tags: [auth]
      operationId: beginBrowserLogin
      summary: Start the browser OIDC login flow
      parameters:
        - name: returnTo
          in: query
          required: false
          description: Relative path to redirect to after login (must start with `/`). Defaults to `/`.
          schema:
            type: string
      responses:
        '302':
          description: Redirect to the OIDC authorization endpoint.
  /callback:
    get:
      tags: [auth]
      operationId: handleBrowserLoginCallback
      summary: Complete the browser OIDC login flow
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
        - name: iss
          in: query
          required: false
          schema:
            type: string
            format: uri
      responses:
        '302':
          description: Redirect to the returnTo path on success or /api/login on failure.
  /logout:
    get:
      tags: [auth]
      operationId: logoutBrowserSession
      summary: Clear the session and begin OIDC logout
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '302':
          description: Redirect to the OIDC provider logout URL.
  /mobile-auth/token-exchange:
    post:
      tags: [auth]
      operationId: exchangeMobileAuthorizationCode
      summary: Exchange a mobile OIDC code for a session token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MobileTokenExchangeRequest'
      responses:
        '200':
          description: Session created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileTokenExchangeSuccess'
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Token exchange failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /mobile-auth/logout:
    post:
      tags: [auth]
      operationId: logoutMobileSession
      summary: Delete a mobile session token
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
      responses:
        '200':
          description: Logout processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutSuccess'

  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Dashboard ──────────────────────────────────────────────────
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Today's summary — events, pending inbox count, upcoming items
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/today-events:
    get:
      operationId: getTodayEvents
      tags: [dashboard]
      summary: Calendar events for today
      responses:
        "200":
          description: Today's events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CalendarEvent"

  /dashboard/upcoming-tasks:
    get:
      operationId: getUpcomingTasks
      tags: [dashboard]
      summary: Tasks due in the next 7 days
      responses:
        "200":
          description: Upcoming tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"

  /dashboard/activity-feed:
    get:
      operationId: getActivityFeed
      tags: [dashboard]
      summary: Recent approved / dismissed actions feed
      responses:
        "200":
          description: Activity feed items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  /dashboard/category-breakdown:
    get:
      operationId: getCategoryBreakdown
      tags: [dashboard]
      summary: Count of inbox items grouped by category this month
      responses:
        "200":
          description: Category breakdown
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CategoryCount"

  # ── Inbox ───────────────────────────────────────────────────────
  /inbox:
    get:
      operationId: listInboxItems
      tags: [inbox]
      summary: List inbox items
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [received, classifying, ready_for_review, approved, dismissed, failed, manual_review]
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: List of inbox items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InboxItem"
    post:
      operationId: createInboxItem
      tags: [inbox]
      summary: Create a new inbox item (manual in-app input)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InboxItemInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InboxItem"

  /inbox/{id}:
    get:
      operationId: getInboxItem
      tags: [inbox]
      summary: Get a single inbox item with its suggested actions
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Inbox item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InboxItemDetail"
        "404":
          description: Not found

  /inbox/{id}/classify:
    post:
      operationId: classifyInboxItem
      tags: [inbox]
      summary: Trigger AI classification of an inbox item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Classification triggered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InboxItem"

  # ── Suggested Actions ───────────────────────────────────────────
  /actions:
    get:
      operationId: listActions
      tags: [actions]
      summary: List pending suggested actions
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, approved, dismissed, auto_handled]
        - name: category
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of actions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SuggestedAction"

  /actions/{id}/approve:
    post:
      operationId: approveAction
      tags: [actions]
      summary: Approve a suggested action (writes calendar event + tasks)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ActionApproval"
      responses:
        "200":
          description: Approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuggestedAction"

  /actions/{id}/dismiss:
    post:
      operationId: dismissAction
      tags: [actions]
      summary: Dismiss a suggested action
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Dismissed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuggestedAction"

  /actions/{id}/edit:
    patch:
      operationId: editAction
      tags: [actions]
      summary: Edit and approve a suggested action
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ActionEdit"
      responses:
        "200":
          description: Updated and approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuggestedAction"

  # ── Tasks ────────────────────────────────────────────────────────
  /tasks:
    get:
      operationId: listTasks
      tags: [tasks]
      summary: List household tasks
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, in_progress, done, cancelled]
        - name: owner_id
          in: query
          schema:
            type: ["integer", "null"]
        - name: category
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"
    post:
      operationId: createTask
      tags: [tasks]
      summary: Create a task manually
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  /tasks/{id}:
    get:
      operationId: getTask
      tags: [tasks]
      summary: Get a task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "404":
          description: Not found
    patch:
      operationId: updateTask
      tags: [tasks]
      summary: Update a task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
    delete:
      operationId: deleteTask
      tags: [tasks]
      summary: Delete a task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /tasks/{id}/complete:
    post:
      operationId: completeTask
      tags: [tasks]
      summary: Mark a task as done
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  # ── Calendar Events ──────────────────────────────────────────────
  /events:
    get:
      operationId: listEvents
      tags: [events]
      summary: List calendar events
      parameters:
        - name: from
          in: query
          schema:
            type: string
            format: date
        - name: to
          in: query
          schema:
            type: string
            format: date
        - name: category
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CalendarEvent"
    post:
      operationId: createEvent
      tags: [events]
      summary: Create a calendar event manually
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CalendarEventInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalendarEvent"

  /events/{id}:
    get:
      operationId: getEvent
      tags: [events]
      summary: Get a calendar event
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalendarEvent"
        "404":
          description: Not found
    patch:
      operationId: updateEvent
      tags: [events]
      summary: Update a calendar event
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CalendarEventUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalendarEvent"
    delete:
      operationId: deleteEvent
      tags: [events]
      summary: Delete a calendar event
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Contacts ─────────────────────────────────────────────────────
  /contacts:
    get:
      operationId: listContacts
      tags: [contacts]
      summary: List household contacts
      parameters:
        - name: category
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of contacts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Contact"
    post:
      operationId: createContact
      tags: [contacts]
      summary: Create a contact
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contact"

  /contacts/{id}:
    patch:
      operationId: updateContact
      tags: [contacts]
      summary: Update a contact
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contact"
    delete:
      operationId: deleteContact
      tags: [contacts]
      summary: Delete a contact
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /contacts/{id}/request-consent:
    post:
      operationId: requestContactConsent
      tags: [contacts]
      summary: Send a WhatsApp consent request to a contact (LGPD)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Consent request sent (or attempted)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsentRequestResponse"
        "400":
          description: Contact has no phone number
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "409":
          description: Contact has already consented
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "429":
          description: Rate limited — one consent request per 24h per contact
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsentRateLimitError"

  # ── Privacy (LGPD) ────────────────────────────────────────────────
  /privacy/export:
    get:
      operationId: exportPrivacyData
      tags: [privacy]
      summary: Export all household data as JSON (LGPD Art. 18 V)
      responses:
        "200":
          description: Full household data export
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrivacyExport"

  /account:
    delete:
      operationId: deleteAccount
      tags: [privacy]
      summary: Permanently delete the account and all household data (LGPD Art. 18 VI)
      responses:
        "204":
          description: Account and all household data deleted
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  # ── Rules ────────────────────────────────────────────────────────
  /rules:
    get:
      operationId: listRules
      tags: [rules]
      summary: List smart rules
      responses:
        "200":
          description: List of rules
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Rule"
    post:
      operationId: createRule
      tags: [rules]
      summary: Create a smart rule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuleInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Rule"

  /rules/{id}:
    patch:
      operationId: updateRule
      tags: [rules]
      summary: Update a rule
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuleUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Rule"
    delete:
      operationId: deleteRule
      tags: [rules]
      summary: Delete a rule
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /rules/{id}/toggle:
    post:
      operationId: toggleRule
      tags: [rules]
      summary: Pause or resume a rule
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Toggled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Rule"

  # ── Household ────────────────────────────────────────────────────
  /household:
    get:
      operationId: getHousehold
      tags: [household]
      summary: Get the household profile
      responses:
        "200":
          description: Household
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Household"
    patch:
      operationId: updateHousehold
      tags: [household]
      summary: Update household settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HouseholdUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Household"

  /household/members:
    get:
      operationId: listMembers
      tags: [household]
      summary: List household members
      responses:
        "200":
          description: Members list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Member"
    post:
      operationId: createMember
      tags: [household]
      summary: Add a new member to the household
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MemberInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Member"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /household/members/{id}:
    patch:
      operationId: updateMember
      tags: [household]
      summary: Update a household member
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MemberUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Member"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    delete:
      operationId: deleteMember
      tags: [household]
      summary: Remove a member from the household
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "403":
          description: Cannot delete yourself
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /household/invite:
    post:
      operationId: createHouseholdInvite
      tags: [household]
      summary: Generate a household invite and send it via WhatsApp
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HouseholdInviteInput"
      responses:
        "201":
          description: Invite created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HouseholdInvite"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /household/invite/{code}:
    get:
      operationId: getHouseholdInvite
      tags: [household]
      summary: Look up a pending invite by code
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Invite details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HouseholdInviteDetail"
        "404":
          description: Invalid or expired invite
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /household/join/{code}:
    post:
      operationId: acceptHouseholdInvite
      tags: [household]
      summary: Accept a household invite and link the authenticated user to the household
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Joined successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HouseholdJoinResponse"
        "404":
          description: Invalid or expired invite
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /household/plan-status:
    get:
      operationId: getHouseholdPlanStatus
      tags: [household]
      summary: Get current plan, limits, and usage counters for freemium gate UI
      responses:
        "200":
          description: Plan status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlanStatus"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Household not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  # ── Patterns ─────────────────────────────────────────────────────
  /patterns:
    get:
      operationId: listPatterns
      tags: [patterns]
      summary: List pattern observations and suggestions
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [accumulating, threshold_met, suggested, rule_created, dismissed]
      responses:
        "200":
          description: Pattern observations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PatternObservation"

  /patterns/{id}/accept:
    post:
      operationId: acceptPattern
      tags: [patterns]
      summary: Accept a pattern suggestion (creates a rule)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Accepted — rule created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatternObservation"

  /patterns/{id}/dismiss:
    post:
      operationId: dismissPattern
      tags: [patterns]
      summary: Dismiss a pattern suggestion
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Dismissed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatternObservation"

  /auth/otp/send:
    post:
      tags: [auth]
      operationId: sendOtp
      summary: Send WhatsApp OTP to phone number
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendOtpBody"
      responses:
        "200":
          description: OTP sent successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendOtpResponse"
        "400":
          description: Invalid phone number or send failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Failed to send message
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /auth/otp/verify:
    post:
      tags: [auth]
      operationId: verifyOtp
      summary: Verify WhatsApp OTP and create authenticated session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyOtpBody"
      responses:
        "200":
          description: OTP verified — session cookie set
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerifyOtpResponse"
        "400":
          description: Invalid or expired code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /onboarding/state:
    get:
      tags: [onboarding]
      operationId: getOnboardingState
      summary: Get or create onboarding state for current user
      responses:
        "200":
          description: Current onboarding state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnboardingStateEnvelope"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /onboarding/complete:
    post:
      tags: [onboarding]
      operationId: completeOnboarding
      summary: Mark onboarding complete and save collected data
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OnboardingCompleteInput"
      responses:
        "200":
          description: Onboarding completed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnboardingCompleteSuccess"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  # ── Memory staging ────────────────────────────────────────────────
  /memory/staging:
    get:
      operationId: listMemoryStaging
      tags: [memory]
      summary: List pending memory staging items awaiting household confirmation
      responses:
        "200":
          description: Pending staging items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MemoryStagingItem"

  /memory/staging/{id}/confirm:
    post:
      operationId: confirmMemoryStaging
      tags: [memory]
      summary: Confirm a memory staging item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Confirmed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemoryStagingItem"
        "404":
          description: Not found

  /memory/staging/{id}/dismiss:
    post:
      operationId: dismissMemoryStaging
      tags: [memory]
      summary: Dismiss a memory staging item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Dismissed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemoryStagingItem"
        "404":
          description: Not found

  /audit:
    get:
      operationId: listAuditLog
      tags: [memory]
      summary: List recent household audit log entries
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Audit log entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AuditLogEntry"

  # ── Briefing ──────────────────────────────────────────────────────
  /briefing/send:
    post:
      operationId: sendDailyBriefing
      tags: [briefing]
      summary: Send the daily household briefing via WhatsApp to the admin
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        "200":
          description: Briefing sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BriefingSendResponse"
        "400":
          description: No admin phone configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "502":
          description: WhatsApp send failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

components:
  parameters:
    AuthorizationSessionHeader:
      name: Authorization
      in: header
      required: false
      description: Opaque session token — `Bearer <sid>`.
      schema:
        type: string
    SessionCookie:
      name: sid
      in: cookie
      required: false
      description: Browser session cookie.
      schema:
        type: string

  schemas:
    AuthUser:
      type: object
      required: [id, email, firstName, lastName, profileImageUrl]
      properties:
        id:
          type: string
        email:
          type: [string, 'null']
          format: email
        phone:
          type: [string, 'null']
        firstName:
          type: [string, 'null']
        lastName:
          type: [string, 'null']
        profileImageUrl:
          type: [string, 'null']
    AuthUserEnvelope:
      type: object
      required: [user]
      properties:
        user:
          oneOf:
            - $ref: '#/components/schemas/AuthUser'
            - type: 'null'
    MobileTokenExchangeRequest:
      type: object
      required: [code, code_verifier, redirect_uri, state]
      properties:
        code:
          type: string
          minLength: 1
        code_verifier:
          type: string
          minLength: 1
        redirect_uri:
          type: string
          minLength: 1
          format: uri
        state:
          type: string
          minLength: 1
        nonce:
          type: string
          minLength: 1
    MobileTokenExchangeSuccess:
      type: object
      required: [token]
      properties:
        token:
          type: string
    LogoutSuccess:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string

    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    # ── Household / Members ──────────────────────────────────────
    Household:
      type: object
      required: [id, name, plan]
      properties:
        id:
          type: integer
        name:
          type: string
        location:
          type: ["string", "null"]
        plan:
          type: string
          enum: [free, premium]
        concierge_eligible:
          type: boolean
        briefing_hour:
          type: integer
          minimum: 0
          maximum: 23
          description: Hour (0-23) in the household's local timezone at which the daily briefing is sent automatically.
        timezone:
          type: string
          description: IANA timezone name for this household (e.g. "America/Sao_Paulo"). Defaults to "America/Sao_Paulo".
        created_at:
          type: string
          format: date-time

    HouseholdUpdate:
      type: object
      properties:
        name:
          type: string
        location:
          type: string
        plan:
          type: string
          enum: [free, premium]
        briefing_hour:
          type: integer
          minimum: 0
          maximum: 23
          description: Hour (0-23) in the household's local timezone at which the daily briefing is sent automatically.
        timezone:
          type: string
          description: IANA timezone name for this household (e.g. "America/Sao_Paulo").

    Member:
      type: object
      required: [id, name, role]
      properties:
        id:
          type: integer
        household_id:
          type: integer
        user_id:
          type: ["string", "null"]
        name:
          type: string
        display_name:
          type: ["string", "null"]
        role:
          type: string
          enum: [admin, member, restricted]
        relationship_type:
          type: string
          enum: [adult, child, other]
        phone:
          type: ["string", "null"]
        avatar_url:
          type: ["string", "null"]
        colour:
          type: ["string", "null"]
        birth_year:
          type: ["integer", "null"]
        school:
          type: ["string", "null"]
        grade:
          type: ["string", "null"]
        primary_doctor:
          type: ["string", "null"]
        schedule:
          type: ["string", "null"]
        medical_plan:
          type: ["string", "null"]
        created_at:
          type: string
          format: date-time

    MemberInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
        display_name:
          type: string
        role:
          type: string
          enum: [admin, member, restricted]
        relationship_type:
          type: string
          enum: [adult, child, other]
        phone:
          type: string
        avatar_url:
          type: string
        colour:
          type: string
        birth_year:
          type: integer
        school:
          type: string
        grade:
          type: string
        primary_doctor:
          type: string
        schedule:
          type: string
        medical_plan:
          type: string

    MemberUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        display_name:
          type: string
        role:
          type: string
          enum: [admin, member, restricted]
        relationship_type:
          type: string
          enum: [adult, child, other]
        phone:
          type: string
        avatar_url:
          type: string
        colour:
          type: string
        birth_year:
          type: integer
        school:
          type: string
        grade:
          type: string
        primary_doctor:
          type: string
        schedule:
          type: string
        medical_plan:
          type: string

    HouseholdInviteInput:
      type: object
      required: [phone]
      properties:
        phone:
          type: string
          minLength: 8

    HouseholdInvite:
      type: object
      required: [id, code, household_id, invited_phone, expires_at, whatsapp_sent]
      properties:
        id:
          type: integer
        code:
          type: string
        household_id:
          type: integer
        invited_phone:
          type: string
        expires_at:
          type: string
          format: date-time
        whatsapp_sent:
          type: boolean

    HouseholdInviteDetail:
      type: object
      required: [id, code, household_id, household_name, invited_phone, expires_at]
      properties:
        id:
          type: integer
        code:
          type: string
        household_id:
          type: integer
        household_name:
          type: string
        invited_phone:
          type: string
        expires_at:
          type: string
          format: date-time
        accepted_at:
          type: ["string", "null"]
          format: date-time

    HouseholdJoinResponse:
      type: object
      required: [success, household_id]
      properties:
        success:
          type: boolean
        household_id:
          type: integer

    PlanStatus:
      type: object
      required: [plan, limits, usage]
      properties:
        plan:
          type: string
          enum: [free, premium]
        limits:
          type: object
          required: [adults, children, rules]
          properties:
            adults:
              type: ["integer", "null"]
              description: Maximum number of adult members allowed. Null means unlimited.
            children:
              type: ["integer", "null"]
              description: Maximum number of child members allowed. Null means unlimited.
            rules:
              type: ["integer", "null"]
              description: Maximum number of rules allowed. Null means unlimited.
        usage:
          type: object
          required: [adults, children, rules]
          properties:
            adults:
              type: integer
              description: Current number of adult members.
            children:
              type: integer
              description: Current number of child members.
            rules:
              type: integer
              description: Current number of active rules.

    # ── Contacts ─────────────────────────────────────────────────
    Contact:
      type: object
      required: [id, name, category]
      properties:
        id:
          type: integer
        name:
          type: string
        phone:
          type: ["string", "null"]
        category:
          type: string
          enum: [escola, saude, casa, diarista, portaria, sindico, social, servicos, familia, outros]
        aliases:
          type: array
          items:
            type: string
        notes:
          type: ["string", "null"]
        consent_status:
          type: ["string", "null"]
          enum: [not_required, pending, consented, revoked]
        consent_granted_at:
          type: ["string", "null"]
          format: date-time
        consent_withdrawn_at:
          type: ["string", "null"]
          format: date-time
        last_consent_requested_at:
          type: ["string", "null"]
          format: date-time
        created_at:
          type: string
          format: date-time

    ConsentRequestResponse:
      type: object
      required: [contact, whatsapp_sent]
      properties:
        contact:
          $ref: "#/components/schemas/Contact"
        whatsapp_sent:
          type: boolean

    ConsentRateLimitError:
      type: object
      required: [error, next_allowed_at]
      properties:
        error:
          type: string
        next_allowed_at:
          type: string
          format: date-time

    PrivacyExport:
      type: object
      required: [exported_at, user_id]
      properties:
        exported_at:
          type: string
          format: date-time
        user_id:
          type: string
        household:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/Household"
        members:
          type: array
          items:
            $ref: "#/components/schemas/Member"
        contacts:
          type: array
          items:
            $ref: "#/components/schemas/Contact"
        inbox_items:
          type: array
          items:
            $ref: "#/components/schemas/InboxItem"
        suggested_actions:
          type: array
          items:
            $ref: "#/components/schemas/SuggestedAction"
        events:
          type: array
          items:
            $ref: "#/components/schemas/CalendarEvent"
        tasks:
          type: array
          items:
            $ref: "#/components/schemas/Task"
        rules:
          type: array
          items:
            $ref: "#/components/schemas/Rule"
        patterns:
          type: array
          items:
            $ref: "#/components/schemas/PatternObservation"
        memory_staging:
          type: array
          items:
            $ref: "#/components/schemas/MemoryStagingItem"
        audit_log:
          type: array
          items:
            $ref: "#/components/schemas/AuditLogEntry"

    ContactInput:
      type: object
      required: [name, category]
      properties:
        name:
          type: string
        phone:
          type: string
        category:
          type: string
          enum: [escola, saude, casa, diarista, portaria, sindico, social, servicos, familia, outros]
        aliases:
          type: array
          items:
            type: string
        notes:
          type: string

    ContactUpdate:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        category:
          type: string
        aliases:
          type: array
          items:
            type: string
        notes:
          type: string
        consent_status:
          type: string
          enum: [not_required, pending, consented, revoked]

    # ── Inbox ────────────────────────────────────────────────────
    InboxItem:
      type: object
      required: [id, source, raw_content, status, created_at]
      properties:
        id:
          type: integer
        source:
          type: string
          enum: [whatsapp, email, manual, photo]
        raw_content:
          type: string
        media_url:
          type: ["string", "null"]
        status:
          type: string
          enum: [received, classifying, ready_for_review, approved, dismissed, failed, manual_review]
        sender_name:
          type: ["string", "null"]
        created_at:
          type: string
          format: date-time
        actions_count:
          type: integer

    InboxItemDetail:
      type: object
      required: [id, source, raw_content, status, created_at, actions]
      properties:
        id:
          type: integer
        source:
          type: string
        raw_content:
          type: string
        media_url:
          type: ["string", "null"]
        status:
          type: string
        sender_name:
          type: ["string", "null"]
        created_at:
          type: string
          format: date-time
        actions:
          type: array
          items:
            $ref: "#/components/schemas/SuggestedAction"

    InboxItemInput:
      type: object
      required: [raw_content, source]
      properties:
        raw_content:
          type: string
        source:
          type: string
          enum: [manual, whatsapp, email, photo]
        sender_name:
          type: string

    # ── Suggested Actions ────────────────────────────────────────
    SuggestedAction:
      type: object
      required: [id, inbox_item_id, category, type, title, approval_level, status, confidence]
      properties:
        id:
          type: integer
        inbox_item_id:
          type: integer
        category:
          type: string
          enum: [escola, saude, casa, social, logistica, refeicoes, servicos, outros]
        type:
          type: string
          enum: [event, task, reminder, fyi]
        title:
          type: string
        datetime:
          type: ["string", "null"]
        suggested_owner:
          type: ["string", "null"]
        approval_level:
          type: string
          enum: [soft, one_tap, explicit]
        confidence:
          type: number
        status:
          type: string
          enum: [pending, approved, dismissed, auto_handled]
        notes:
          type: ["string", "null"]
        cascade_check_needed:
          type: boolean
        workflow_tags:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time

    ActionApproval:
      type: object
      properties:
        notes:
          type: string

    ActionEdit:
      type: object
      properties:
        title:
          type: string
        category:
          type: string
        type:
          type: string
        datetime:
          type: string
        suggested_owner:
          type: string
        notes:
          type: string

    # ── Tasks ─────────────────────────────────────────────────────
    Task:
      type: object
      required: [id, title, status, created_at]
      properties:
        id:
          type: integer
        title:
          type: string
        owner_id:
          type: ["integer", "null"]
        owner_name:
          type: ["string", "null"]
        due_at:
          type: ["string", "null"]
          format: date-time
        status:
          type: string
          enum: [pending, in_progress, done, cancelled]
        category:
          type: ["string", "null"]
        linked_event_id:
          type: ["integer", "null"]
        workflow_tags:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time
        completed_at:
          type: ["string", "null"]

    TaskInput:
      type: object
      required: [title]
      properties:
        title:
          type: string
        owner_id:
          type: integer
        due_at:
          type: string
          format: date-time
        category:
          type: string
        workflow_tags:
          type: array
          items:
            type: string

    TaskUpdate:
      type: object
      properties:
        title:
          type: string
        owner_id:
          type: ["integer", "null"]
        due_at:
          type: ["string", "null"]
        status:
          type: string
          enum: [pending, in_progress, done, cancelled]
        category:
          type: string

    # ── Calendar Events ──────────────────────────────────────────
    CalendarEvent:
      type: object
      required: [id, title, start_at, category, created_at]
      properties:
        id:
          type: integer
        title:
          type: string
        start_at:
          type: string
          format: date-time
        end_at:
          type: ["string", "null"]
          format: date-time
        all_day:
          type: boolean
        category:
          type: string
          enum: [escola, saude, casa, social, logistica, refeicoes, servicos, outros]
        members:
          type: array
          items:
            type: string
        source:
          type: string
          enum: [manual, auto, pattern]
        sync_status:
          type: string
          enum: [synced, pending, failed, local]
        notes:
          type: ["string", "null"]
        workflow_tags:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time

    CalendarEventInput:
      type: object
      required: [title, start_at, category]
      properties:
        title:
          type: string
        start_at:
          type: string
          format: date-time
        end_at:
          type: string
          format: date-time
        all_day:
          type: boolean
        category:
          type: string
          enum: [escola, saude, casa, social, logistica, refeicoes, servicos, outros]
        members:
          type: array
          items:
            type: string
        notes:
          type: string

    CalendarEventUpdate:
      type: object
      properties:
        title:
          type: string
        start_at:
          type: string
          format: date-time
        end_at:
          type: string
          format: date-time
        all_day:
          type: boolean
        category:
          type: string
        notes:
          type: string

    # ── Rules ─────────────────────────────────────────────────────
    Rule:
      type: object
      required: [id, name, category, trigger_desc, action_desc, approval_level, confidence, active]
      properties:
        id:
          type: integer
        name:
          type: string
        category:
          type: string
          enum: [escola, saude, casa, social, logistica, refeicoes, servicos, outros]
        trigger_desc:
          type: string
        action_desc:
          type: string
        approval_level:
          type: string
          enum: [soft, one_tap, explicit]
        confidence:
          type: number
        active:
          type: boolean
        origin:
          type: string
          enum: [system_template, user_created, pattern_suggested]
        times_triggered:
          type: integer
        times_approved:
          type: integer
        times_dismissed:
          type: integer
        created_at:
          type: string
          format: date-time

    RuleInput:
      type: object
      required: [name, category, trigger_desc, action_desc, approval_level]
      properties:
        name:
          type: string
        category:
          type: string
        trigger_desc:
          type: string
        action_desc:
          type: string
        approval_level:
          type: string
          enum: [soft, one_tap, explicit]

    RuleUpdate:
      type: object
      properties:
        name:
          type: string
        trigger_desc:
          type: string
        action_desc:
          type: string
        approval_level:
          type: string
          enum: [soft, one_tap, explicit]
        active:
          type: boolean

    # ── Patterns ──────────────────────────────────────────────────
    PatternObservation:
      type: object
      required: [id, type, description, occurrences, confidence, status]
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [sender, sequence, temporal, ownership, absence, seasonal]
        description:
          type: string
        occurrences:
          type: integer
        confidence:
          type: number
        status:
          type: string
          enum: [accumulating, threshold_met, suggested, rule_created, dismissed]
        evidence:
          type: ["string", "null"]
        created_at:
          type: string
          format: date-time

    # ── Dashboard ─────────────────────────────────────────────────
    DashboardSummary:
      type: object
      required: [pending_inbox_count, todays_events_count, tasks_due_today, tasks_overdue, active_rules_count]
      properties:
        pending_inbox_count:
          type: integer
        todays_events_count:
          type: integer
        tasks_due_today:
          type: integer
        tasks_overdue:
          type: integer
        active_rules_count:
          type: integer
        pattern_suggestions_pending:
          type: integer

    ActivityItem:
      type: object
      required: [id, description, actor, timestamp, action_type]
      properties:
        id:
          type: integer
        description:
          type: string
        actor:
          type: string
        timestamp:
          type: string
          format: date-time
        action_type:
          type: string
          enum: [approved, dismissed, rule_triggered, pattern_suggested, task_completed]
        category:
          type: ["string", "null"]

    CategoryCount:
      type: object
      required: [category, count]
      properties:
        category:
          type: string
        count:
          type: integer
        label:
          type: string

    OnboardingComposition:
      type: object
      required: [adults, children, others]
      properties:
        adults:
          type: integer
        children:
          type: integer
        others:
          type: integer

    OnboardingState:
      type: object
      required: [id, user_id, household_id, completed, current_step, whatsapp_verified, calendar_connected, pain_points]
      properties:
        id:
          type: integer
        user_id:
          type: string
        household_id:
          type: integer
        completed:
          type: boolean
        current_step:
          type: integer
        whatsapp_verified:
          type: boolean
        calendar_connected:
          type: boolean
        pain_points:
          type: array
          items:
            type: string
        composition:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/OnboardingComposition"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    OnboardingStateEnvelope:
      type: object
      required: [state]
      properties:
        state:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/OnboardingState"

    OnboardingCompleteInput:
      type: object
      properties:
        household_name:
          type: string
        display_name:
          type: string
        composition:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/OnboardingComposition"
        pain_points:
          type: array
          items:
            type: string
        whatsapp_phone:
          type: ["string", "null"]
        whatsapp_verified:
          type: boolean
        calendar_connected:
          type: boolean

    OnboardingCompleteSuccess:
      type: object
      required: [success]
      properties:
        success:
          type: boolean

    SendOtpBody:
      type: object
      required: [phone]
      properties:
        phone:
          type: string
          description: Phone number (E.164 or local Brazilian format)

    SendOtpResponse:
      type: object
      required: [sent]
      properties:
        sent:
          type: boolean
        message:
          type: [string, 'null']

    VerifyOtpBody:
      type: object
      required: [phone, code]
      properties:
        phone:
          type: string
        code:
          type: string

    VerifyOtpResponse:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
        user:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/AuthUser"

    BriefingSendResponse:
      type: object
      required: [sent]
      properties:
        sent:
          type: boolean
        sid:
          type: string
        eventsCount:
          type: integer
        tasksCount:
          type: integer

    # ── Memory ────────────────────────────────────────────────────
    MemoryStagingItem:
      type: object
      required: [id, target_table, proposed_record, context_summary, status, created_at, expires_at]
      properties:
        id:
          type: integer
        target_table:
          type: string
          enum: [household_places, household_routines, household_preferences]
        proposed_record:
          type: object
          additionalProperties: true
        extracted_from_inbox_id:
          type: ["integer", "null"]
        context_summary:
          type: string
        status:
          type: string
          enum: [pending, confirmed, dismissed, expired]
        surfaced_to_user_at:
          type: ["string", "null"]
          format: date-time
        responded_at:
          type: ["string", "null"]
          format: date-time
        created_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time

    AuditLogEntry:
      type: object
      required: [id, action, actor, action_type, description, timestamp]
      properties:
        id:
          type: integer
        action:
          type: string
        actor:
          type: string
        action_type:
          type: string
        category:
          type: ["string", "null"]
        description:
          type: string
        timestamp:
          type: string
          format: date-time
