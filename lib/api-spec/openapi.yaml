      responses:
        "200":
          description: Onboarding completed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnboardingCompleteSuccess"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  # ── Memory staging ────────────────────────────────────────────────
  /memory/staging:
    get:
      operationId: listMemoryStaging
      tags: [memory]
      summary: List pending memory staging items awaiting household confirmation
      responses:
        "200":
          description: Pending staging items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MemoryStagingItem"

  /memory/staging/{id}/confirm:
    post:
      operationId: confirmMemoryStaging
      tags: [memory]
      summary: Confirm a memory staging item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Confirmed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemoryStagingItem"
        "404":
          description: Not found

  /memory/staging/{id}/dismiss:
    post:
      operationId: dismissMemoryStaging
      tags: [memory]
      summary: Dismiss a memory staging item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Dismissed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemoryStagingItem"
        "404":
          description: Not found

  /audit:
    get:
      operationId: listAuditLog
      tags: [memory]
      summary: List recent household audit log entries
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Audit log entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AuditLogEntry"

  # ── Briefing ──────────────────────────────────────────────────────
  /briefing/send:
    post:
      operationId: sendDailyBriefing
      tags: [briefing]
      summary: Send the daily household briefing via WhatsApp to the admin
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        "200":
          description: Briefing sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BriefingSendResponse"
        "400":
          description: No admin phone configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "502":
          description: WhatsApp send failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  # ── Payment Obligations ───────────────────────────────────────────
  /payment-obligations:
    get:
      operationId: listPaymentObligations
      tags: [payments]
      summary: List household payment obligations
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, paid, overdue, cancelled, comprovante_received]
      responses:
        "200":
          description: List of payment obligations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PaymentObligation"
    post:
      operationId: createPaymentObligation
      tags: [payments]
      summary: Create a payment obligation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentObligationInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentObligation"

  /payment-obligations/reimbursements:
    get:
      operationId: getPaymentReimbursements
      tags: [payments]
      summary: Get pending reimbursements split by direction (owed by me / owed to me)
      responses:
        "200":
          description: Reimbursement summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentReimbursementSummary"

  /payment-obligations/{id}:
    patch:
      operationId: updatePaymentObligation
      tags: [payments]
      summary: Update a payment obligation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentObligationUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentObligation"
        "404":
          description: Not found
    delete:
      operationId: deletePaymentObligation
      tags: [payments]
      summary: Delete a payment obligation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /payment-obligations/{id}/settle:
    post:
      operationId: settlePaymentObligation
      tags: [payments]
      summary: Mark a reimbursement as settled (paid off between parties)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                note:
                  type: string
      responses:
        "200":
          description: Settled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentObligation"
        "404":
          description: Not found

  /payment-obligations/{id}/comprovante:
    post:
      operationId: attachComprovante
      tags: [payments]
      summary: Upload proof of payment image (multipart), store in object storage, run OCR and mark obligation as paid
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  description: Comprovante image file field name (multipart binary upload — JPEG, PNG, WebP, PDF)
      responses:
        "200":
          description: Comprovante attached, OCR result returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComprovanteAttachResult"
        "400":
          description: No file uploaded
        "404":
          description: Not found

components:
  parameters:
    AuthorizationSessionHeader:
      name: Authorization
      in: header
      required: false
      description: Opaque session token — `Bearer <sid>`.
      schema:
        type: string
    SessionCookie:
      name: sid
      in: cookie
      required: false
      description: Browser session cookie.
      schema:
        type: string

  schemas:
    AuthUser:
      type: object
      required: [id, email, firstName, lastName, profileImageUrl]
      properties:
        id:
          type: string
        email:
          type: [string, 'null']
          format: email
        phone:
          type: [string, 'null']
        firstName:
          type: [string, 'null']
        lastName:
          type: [string, 'null']
        profileImageUrl:
          type: [string, 'null']
    AuthUserEnvelope:
      type: object
      required: [user]
      properties:
        user:
          oneOf:
            - $ref: '#/components/schemas/AuthUser'
            - type: 'null'
    MobileTokenExchangeRequest:
      type: object
      required: [code, code_verifier, redirect_uri, state]
      properties:
        code:
          type: string
          minLength: 1
        code_verifier:
          type: string
          minLength: 1
        redirect_uri:
          type: string
          minLength: 1
          format: uri
        state:
          type: string
          minLength: 1
        nonce:
          type: string
          minLength: 1
    MobileTokenExchangeSuccess:
      type: object
      required: [token]
      properties:
        token:
          type: string
    LogoutSuccess:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
    RequestUploadUrlBody:
      type: object
      required: [name, size, contentType]
      properties:
        name:
          type: string
          minLength: 1
          description: Original file name
        size:
          type: integer
          minimum: 1
          description: File size in bytes
        contentType:
          type: string
          minLength: 1
          description: MIME type (e.g. image/jpeg)
    RequestUploadUrlResponse:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL:
          type: string
          description: Presigned GCS URL for PUT upload
        objectPath:
          type: string
          description: Normalized object path to store in DB
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string

    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    # ── Household / Members ──────────────────────────────────────
    Household:
      type: object
      required: [id, name, plan]
      properties:
        id:
          type: integer
        name:
          type: string
        location:
          type: ["string", "null"]
        plan:
          type: string
          enum: [free, premium]
        concierge_eligible:
          type: boolean
        briefing_hour:
          type: integer
          minimum: 0
          maximum: 23
          description: >
            Digest time as a local hour (0–23) in the household's timezone.
            This is the household's configured digest/briefing time with hour granularity
            (e.g. 7 = 07h00 local). Serves as the digest_time field for this product.
        timezone:
          type: string
          description: IANA timezone name for this household (e.g. "America/Sao_Paulo"). Defaults to "America/Sao_Paulo".
        last_briefing_sent_at:
          type: ["string", "null"]
          format: date-time
          description: Timestamp of the last successfully delivered daily briefing. Null if no briefing has been sent yet.
        digest_enabled:
          type: boolean
          description: Whether the proactive daily digest is enabled for this household.
        digest_paused_until:
          type: ["string", "null"]
          format: date-time
          description: When set, proactive messages are suppressed until this timestamp (set by PAUSAR command).
        digest_stopped:
          type: boolean
          description: When true, all proactive messages are permanently stopped (set by PARAR command).
        quiet_hour_start:
          type: integer
          minimum: 0
          maximum: 23
          description: Local hour (0–23) at which the household's quiet window starts. Messages scheduled after this are held until quiet_hour_end. Default 21 (21h00 local).
        quiet_hour_end:
          type: integer
          minimum: 0
          maximum: 23
          description: Local hour (0–23) at which the household's quiet window ends. Held messages are released at this hour. Default 7 (07h00 local).
        created_at:
          type: string
          format: date-time

    HouseholdUpdate:
      type: object
      properties:
        name:
          type: string
        location:
          type: string
        briefing_hour:
          type: integer
          minimum: 0
          maximum: 23
          description: Digest time as a local hour (0–23) in the household's timezone (e.g. 7 = 07h00 local).
        timezone:
          type: string
          description: IANA timezone name for this household (e.g. "America/Sao_Paulo").
        digest_enabled:
          type: boolean
          description: Whether the proactive daily digest is enabled.
        digest_stopped:
          type: boolean
          description: When true, all proactive messages are permanently stopped.
        quiet_hour_start:
          type: integer
          minimum: 0
          maximum: 23
          description: Local hour at which the quiet window starts (default 21). Messages scheduled after this are held.
        quiet_hour_end:
          type: integer
          minimum: 0
          maximum: 23
          description: Local hour at which the quiet window ends (default 7). Held messages are released at this hour.

    Member:
      type: object
      required: [id, name, role]
      properties:
        id:
          type: integer
        household_id:
          type: integer
        user_id:
          type: ["string", "null"]
        name:
          type: string
        display_name:
          type: ["string", "null"]
        role:
          type: string
          enum: [admin, member, restricted]
        relationship_type:
          type: string
          enum: [adult, child, other]
        phone:
          type: ["string", "null"]
        avatar_url:
          type: ["string", "null"]
        colour:
          type: ["string", "null"]
        birth_year:
          type: ["integer", "null"]
        school:
          type: ["string", "null"]
        grade:
          type: ["string", "null"]
        primary_doctor:
          type: ["string", "null"]
        schedule:
          type: ["string", "null"]
        medical_plan:
          type: ["string", "null"]
        created_at:
          type: string
          format: date-time

    MemberInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
        display_name:
          type: string
        role:
          type: string
          enum: [admin, member, restricted]
        relationship_type:
          type: string
          enum: [adult, child, other]
        phone:
          type: string
        avatar_url:
          type: string
        colour:
          type: string
        birth_year:
          type: integer
        school:
          type: string
        grade:
          type: string
        primary_doctor:
          type: string
        schedule:
          type: string
        medical_plan:
          type: string

    MemberUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        display_name:
          type: string
        role:
