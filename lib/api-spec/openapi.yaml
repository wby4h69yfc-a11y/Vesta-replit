          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerifyOtpResponse"
        "400":
          description: Invalid or expired code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /onboarding/state:
    get:
      tags: [onboarding]
      operationId: getOnboardingState
