      responses:
        "200":
          description: Pattern observations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PatternObservation"

  /patterns/{id}/accept:
    post:
      operationId: acceptPattern
      tags: [patterns]
      summary: Accept a pattern suggestion (marks as accepted; final rule_created status is set when the rule is saved via POST /rules with pattern_id)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Accepted — pattern status set to accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatternObservation"

  /patterns/{id}/dismiss:
    post:
      operationId: dismissPattern
      tags: [patterns]
      summary: Dismiss a pattern suggestion
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Dismissed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatternObservation"

  /patterns/detect:
    post:
      operationId: triggerPatternDetection
      tags: [patterns]
